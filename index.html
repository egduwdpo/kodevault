<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KodeVault — Simpan &amp; Bagikan Kode</title>
<link rel="stylesheet" href="style.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

<!-- ============ TOPBAR ============ -->
<header class="topbar">
  <a href="#/" class="brand">
    <svg width="26" height="26" viewBox="0 0 26 26" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="1" y="1" width="24" height="24" rx="6" stroke="currentColor" stroke-width="1.6"/>
      <path d="M8 9L5 13L8 17" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M18 9L21 13L18 17" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M14.5 7.5L11.5 18.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
    </svg>
    <span>Kode<em>Vault</em></span>
  </a>
  <nav class="topnav">
    <a href="#/" data-nav="browse">Jelajah</a>
    <span id="nav-admin-only" class="hidden">
      <a href="#/admin" data-nav="admin">Dasbor</a>
      <button id="btn-logout" class="link-btn">Keluar</button>
    </span>
    <span id="nav-guest-only">
      <a href="#/login" data-nav="login">Masuk Admin</a>
    </span>
  </nav>
</header>

<main id="app"></main>

<footer class="footer">
  <div class="footer-inner">
    <span>$ kodevault --status <em>prototype v0.1</em></span>
    <span>dibuat iseng · dikembangkan serius nanti</span>
  </div>
</footer>

<!-- ============ TEMPLATES ============ -->

<template id="tpl-login">
  <section class="screen screen-center">
    <div class="terminal-card">
      <div class="terminal-bar">
        <span class="dot dot-r"></span><span class="dot dot-y"></span><span class="dot dot-g"></span>
        <span class="terminal-title">admin@kodevault: ~/login</span>
      </div>
      <div class="terminal-body">
        <p class="prompt-line"><span class="prompt-sym">&gt;</span> masuk sebagai admin untuk kelola brankas kode</p>
        <form id="login-form" class="stack">
          <label class="field">
            <span class="field-label">email</span>
            <input type="email" id="login-user" autocomplete="username" placeholder="riswan@kodevault.app" required>
          </label>
          <label class="field">
            <span class="field-label">pass</span>
            <input type="password" id="login-pass" autocomplete="current-password" placeholder="••••••••" required>
          </label>
          <p id="login-error" class="error-line hidden">akses ditolak — email / pass salah</p>
          <button type="submit" class="btn btn-primary btn-block">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M13 3L4 14H12L11 21L20 10H12L13 3Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/></svg>
            masuk
          </button>
        </form>
      </div>
    </div>
  </section>
</template>

<template id="tpl-admin">
  <section class="screen">
    <div class="page-head">
      <div>
        <p class="eyebrow">/root/brankas</p>
        <h1>Dasbor Admin</h1>
        <p class="sub">Tambah cuplikan kode baru, kelola yang sudah ada, dan salin tautan untuk dibagikan.</p>
      </div>
    </div>

    <div class="admin-grid">
      <div class="panel">
        <h2 class="panel-title">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M12 5V19M5 12H19" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          Cuplikan baru
        </h2>
        <form id="snippet-form" class="stack">
          <label class="field">
            <span class="field-label">judul</span>
            <input type="text" id="f-title" placeholder="mis. Validasi Form Login" required>
          </label>
          <div class="field-row">
            <label class="field">
              <span class="field-label">bahasa</span>
              <select id="f-lang">
                <option>JavaScript</option>
                <option>Python</option>
                <option>PHP</option>
                <option>Java</option>
                <option>C++</option>
                <option>C#</option>
                <option>Go</option>
                <option>Rust</option>
                <option>TypeScript</option>
                <option>Kotlin</option>
                <option>Swift</option>
                <option>Ruby</option>
                <option>SQL</option>
                <option>HTML/CSS</option>
                <option>Bash</option>
                <option>Lainnya</option>
              </select>
            </label>
            <label class="field">
              <span class="field-label">harga buka (Rp)</span>
              <input type="number" id="f-price" value="5000" min="0" step="500" required>
            </label>
          </div>
          <label class="field">
            <span class="field-label">deskripsi singkat</span>
            <input type="text" id="f-desc" placeholder="apa fungsi kode ini?" required>
          </label>
          <label class="field">
            <span class="field-label">kode sumber</span>
            <textarea id="f-code" rows="8" placeholder="tempel kode di sini..." required></textarea>
          </label>
          <button type="submit" class="btn btn-primary btn-block">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M4 12L10 18L20 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            simpan &amp; terbitkan
          </button>
        </form>
      </div>

      <div class="panel">
        <h2 class="panel-title">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><rect x="3" y="4" width="18" height="16" rx="2" stroke="currentColor" stroke-width="1.8"/><path d="M3 9H21" stroke="currentColor" stroke-width="1.8"/></svg>
          Semua cuplikan (<span id="admin-count">0</span>)
        </h2>
        <div id="admin-list" class="admin-list"></div>
      </div>
    </div>
  </section>
</template>

<template id="tpl-browse">
  <section class="screen">
    <div class="hero">
      <p class="eyebrow">$ ls /brankas --publik</p>
      <h1>Brankas kode yang dibagikan Riswan</h1>
      <p class="sub">Semua bahasa pemrograman disatukan di sini. Intip judul dan deskripsinya gratis — untuk membuka isi kode dan menyalin/mengunduhnya, buka aksesnya seharga langganan singkat.</p>
    </div>
    <div id="browse-grid" class="grid"></div>
    <p id="browse-empty" class="empty-state hidden">
      Brankas masih kosong. Masuk sebagai admin untuk menambahkan cuplikan pertama.
    </p>
  </section>
</template>

<template id="tpl-detail">
  <section class="screen screen-narrow">
    <a href="#/" class="back-link">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M15 5L8 12L15 19" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      kembali ke brankas
    </a>

    <div class="detail-head">
      <span id="d-lang" class="lang-badge"></span>
      <h1 id="d-title"></h1>
      <p id="d-desc" class="sub"></p>
    </div>

    <div class="code-window" id="d-window">
      <div class="terminal-bar">
        <span class="dot dot-r"></span><span class="dot dot-y"></span><span class="dot dot-g"></span>
        <span class="terminal-title" id="d-filename">snippet</span>
      </div>
      <div class="code-body">
        <pre id="d-code" class="code-pre"></pre>
        <div id="lock-overlay" class="lock-overlay">
          <svg width="46" height="46" viewBox="0 0 24 24" fill="none">
            <rect x="5" y="11" width="14" height="9" rx="2" stroke="currentColor" stroke-width="1.7"/>
            <path d="M8 11V8a4 4 0 0 1 8 0v3" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
            <circle cx="12" cy="15.5" r="1.4" fill="currentColor"/>
          </svg>
          <p class="lock-text">Kode terkunci</p>
          <p class="lock-sub">Buka akses seharga <strong id="lock-price">Rp 5.000</strong> untuk melihat penuh, menyalin, dan mengunduh.</p>
          <button id="btn-unlock" class="btn btn-gold">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><rect x="5" y="11" width="14" height="9" rx="2" stroke="currentColor" stroke-width="1.8"/><path d="M8 11V8a4 4 0 0 1 7-2.6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
            buka akses sekarang
          </button>
        </div>
      </div>
    </div>

    <div id="unlocked-actions" class="action-row hidden">
      <button id="btn-copy" class="btn btn-outline">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><rect x="9" y="9" width="11" height="11" rx="2" stroke="currentColor" stroke-width="1.7"/><path d="M5 15V6a2 2 0 0 1 2-2h9" stroke="currentColor" stroke-width="1.7"/></svg>
        salin kode
      </button>
      <button id="btn-download" class="btn btn-outline">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M12 4V15M12 15L8 11M12 15L16 11" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/><path d="M5 18H19" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
        unduh file
      </button>
    </div>

    <div class="share-box">
      <span class="share-label">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none"><circle cx="6" cy="12" r="2.4" stroke="currentColor" stroke-width="1.6"/><circle cx="18" cy="6" r="2.4" stroke="currentColor" stroke-width="1.6"/><circle cx="18" cy="18" r="2.4" stroke="currentColor" stroke-width="1.6"/><path d="M8.2 10.8L15.8 7.2M8.2 13.2L15.8 16.8" stroke="currentColor" stroke-width="1.6"/></svg>
        tautan bagikan
      </span>
      <input type="text" id="share-url" readonly>
      <button id="btn-share" class="btn btn-outline btn-sm">salin tautan</button>
    </div>
  </section>
</template>

<!-- Modal Pembayaran (simulasi) -->
<div id="pay-modal" class="modal hidden">
  <div class="modal-card">
    <button id="pay-close" class="modal-close" aria-label="tutup">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M6 6L18 18M18 6L6 18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
    </button>
    <p class="eyebrow">simulasi pembayaran</p>
    <h2>Buka akses kode</h2>
    <p class="sub">Ini prototipe — belum tersambung ke payment gateway sungguhan. Tombol di bawah cuma mensimulasikan pembayaran berhasil.</p>
    <div class="qr-mock">
      <svg width="120" height="120" viewBox="0 0 120 120" fill="none">
        <rect width="120" height="120" rx="10" fill="none" stroke="currentColor" stroke-width="1.5"/>
        <rect x="12" y="12" width="26" height="26" fill="currentColor"/>
        <rect x="82" y="12" width="26" height="26" fill="currentColor"/>
        <rect x="12" y="82" width="26" height="26" fill="currentColor"/>
        <rect x="50" y="12" width="10" height="10" fill="currentColor"/>
        <rect x="50" y="50" width="20" height="20" fill="currentColor"/>
        <rect x="82" y="50" width="10" height="10" fill="currentColor"/>
        <rect x="50" y="82" width="10" height="10" fill="currentColor"/>
        <rect x="70" y="70" width="10" height="10" fill="currentColor"/>
        <rect x="96" y="82" width="12" height="12" fill="currentColor"/>
        <rect x="70" y="96" width="10" height="10" fill="currentColor"/>
      </svg>
    </div>
    <p class="pay-amount">Rp <span id="pay-amount">5.000</span></p>
    <button id="pay-confirm" class="btn btn-gold btn-block">
      saya sudah bayar (simulasi)
    </button>
  </div>
</div>

<div id="toast" class="toast hidden"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="config.js"></script>
<script src="script.js"></script>
</body>
</html>
